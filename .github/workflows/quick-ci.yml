name: Quick CI - 快速测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 测试套件
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 设计令牌验证
        run: npm run test:tokens
      
      - name: 单元测试
        run: npm run test
      
      - name: 构建应用
        run: npm run build
      
      - name: 安装 Playwright
        run: npx playwright install --with-deps chromium
      
      - name: E2E 测试
        run: npx playwright test --project=chromium
      
      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            playwright-report/
            coverage/
